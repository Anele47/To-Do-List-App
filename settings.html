<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Settings</title>
   <link rel="stylesheet" href="style.css">

</head>
<body class="setting">

  <!-- NAVBAR -->

  <nav class="bar">

    <h1>⚙ Settings</h1>

    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="tasks.html">Tasks</a></li>
    </ul>

  </nav>

  <!-- SETTINGS -->

  <div class="contain">

    <!-- ACCOUNT -->

    <div class="pack">

      <h2>👤 Account Settings</h2>

      <div class="setting">
        <label>Username</label>
        <input type="text" id="username">
      </div>

      <div class="setting">
        <label>Email</label>
        <input type="email" id="email">
      </div>

      <div class="setting">
        <label>New Password</label>
        <input type="password" id="password">
      </div>

    </div>

    <!-- APPEARANCE -->

    <div class="pack">

      <h2>🎨 Appearance</h2>

      <div class="setting">
        <label>Theme</label>

        <select id="theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>

      <div class="settings">
        <label>Font Size</label>

        <select id="fontSize">
          <option>Small</option>
          <option selected>Medium</option>
          <option>Large</option>
        </select>
      </div>

    </div>

    <!-- NOTIFICATIONS -->

    <div class="pack">

      <h2>🔔 Notifications</h2>

      <div class="toggle">
        <label>Email Notifications</label>
        <input type="checkbox" id="emailNotify">
      </div>

      <div class="toggle">
        <label>Task Reminders</label>
        <input type="checkbox" id="taskReminder">
      </div>

      <div class="toggle">
        <label>Desktop Notifications</label>
        <input type="checkbox" id="desktopNotify">
      </div>

    </div>

    <!-- TASK SETTINGS -->

    <div class="pack">

      <h2>📝 Task Preferences</h2>

      <div class="toggle">
        <label>Show Completed Tasks</label>
        <input type="checkbox" id="showCompleted" checked>
      </div>

      <div class="toggle">
        <label>Enable Task Animations</label>
        <input type="checkbox" id="animations" checked>
      </div>

      <div class="toggle">
        <label>Auto Save Tasks</label>
        <input type="checkbox" id="autosave" checked>
      </div>

    </div>

    <!-- SECURITY -->

    <div class="pack">

      <h2>🔒 Security</h2>

      <div class="toggle">
        <label>Two-Factor Authentication</label>
        <input type="checkbox" id="twofactor">
      </div>

      <div class="toggle">
        <label>Remember Login</label>
        <input type="checkbox" id="remember">
      </div>

    </div>

    <!-- SAVE -->

    <div class="pack">

      <button class="save-btn" onclick="saveSettings()">
        Save Settings
      </button>

      <p class="message" id="message">
        Settings Saved Successfully!
      </p>

    </div>

  </div>

 <script src="settings.js"></script>

</body>
</html>
